<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>User manual — unavailable</title>
	<style>
		:root { color-scheme: light dark; }
		body {
			font-family: system-ui, "Segoe UI", sans-serif;
			margin: 0;
			padding: 1.5rem 1.75rem;
			max-width: 32rem;
			line-height: 1.55;
			font-size: 14px;
		}
		h1 { font-size: 1.15rem; font-weight: 600; margin: 0 0 0.75rem; }
		p { margin: 0 0 0.85rem; color: #444; }
		@media (prefers-color-scheme: dark) { p { color: #c8c8c8; } }
		a { color: #0a7a4b; }
		code { font-size: 0.88em; word-break: break-all; }
		.actions { margin-top: 1.25rem; display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; }
		button, .btn {
			font: inherit;
			cursor: pointer;
			padding: 0.45rem 0.9rem;
			border-radius: 6px;
			border: 1px solid #ccc;
			background: #f4f4f4;
			text-decoration: none;
			color: inherit;
			display: inline-block;
		}
		@media (prefers-color-scheme: dark) {
			button, .btn { background: #2c2c2c; border-color: #555; }
		}
		#url-line { font-size: 12px; }
	</style>
</head>
<body>
	<h1>User manual could not be loaded</h1>
	<p>The online documentation was not reachable. Check your network connection, then try again.</p>
	<p id="url-line" style="display:none">URL: <code id="url-out"></code></p>
	<div class="actions">
		<button type="button" id="retry">Try again</button>
		<a class="btn" id="open" href="#" target="_blank" rel="noopener noreferrer">Open in browser</a>
		<button type="button" id="copy">Copy URL</button>
	</div>
	<script>
		(function () {
			var params = new URLSearchParams( window.location.search );
			var u = params.get( 'u' ) || '';
			if ( u ) {
				try { u = decodeURIComponent( u ); } catch ( e ) {}
			}
			var openEl = document.getElementById( 'open' );
			var retry = document.getElementById( 'retry' );
			var copy = document.getElementById( 'copy' );
			var urlLine = document.getElementById( 'url-line' );
			var urlOut = document.getElementById( 'url-out' );
			if ( u ) {
				openEl.href = u;
				urlOut.textContent = u;
				urlLine.style.display = 'block';
			} else {
				openEl.style.display = 'none';
				copy.style.display = 'none';
			}
			retry.addEventListener( 'click', function () {
				if ( u ) window.location.href = u;
				else window.location.reload();
			} );
			copy.addEventListener( 'click', function () {
				if ( ! u || ! navigator.clipboard ) return;
				navigator.clipboard.writeText( u ).then( function () {
					copy.textContent = 'Copied';
					setTimeout( function () { copy.textContent = 'Copy URL'; }, 2000 );
				} );
			} );
		} )();
	</script>
</body>
</html>
